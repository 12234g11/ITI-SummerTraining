<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
     <form>
        <h2>Change Email Address</h2>
        <input 
        type="text" 
        id="username" 
        name="username" 
        pattern="[A-Za-z]+" 
        title="Username must use letters only." 
        placeholder="Username"
        required>

        <br><br>
        <input 
        type="email" 
        id="email" 
        name="email" 
        required
        placeholder="New Email" >

        <br><br>

        <button type="submit">Change</button>
  </form>
</body>
</html>
