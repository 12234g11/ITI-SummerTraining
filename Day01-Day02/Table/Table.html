<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Food Categorization</title>
  <style>
    table, th, td {
      border: 2px solid red;
      padding: 10px;
      text-align: center;
    }

    h2 {
      text-align: center;
      margin: auto;
    }
    .table{
        margin: 0 auto;
    }
  </style>
</head>
<body>

  <h2>Food Categorization</h2>

    <table class="table">
        <tr>
            <th colspan="2">vegetables</th>
            <th colspan="2">Fruits</th>
        </tr>
        <tr>
            <th>Name</th>
            <th>Color</th>
            <th>Name</th>
            <th>Color</th>
        </tr>
        <tr>
            <td>tomato</td>
            <td>red</td>
            <td rowspan="3">apple</td>
            <td>yellow</td>
        </tr>
        <tr>
            <td>Cucumber</td>
            <td>dark green</td>
            <td>green</td>
        </tr>
        <tr>
            <td>carrot</td>
            <td>orange</td>
            <td>red</td>
        </tr>
    </table>



</body>
</html>
