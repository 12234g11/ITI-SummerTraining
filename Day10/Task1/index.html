<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Document</title>
    <style>
        #progress {
            width: 100%;
            max-width: 600px;
            display: block;
        }
        video {
            width: 100%;
            max-width: 600px;
            background: #000;
        }
    </style>
</head>
<body>
  <video id="myVideo">
    <source src="video.mp4" type="video/mp4">
  </video>

  <input type="range" id="progress" value="0" min="0" max="100" step="0.1">
  <span id="currentTime">0:00 / 0:00</span>


  <div id="controls">
    <button onclick="play()" id="playBtn">Play</button>
    <button onclick="stop()" id="playBtn">Stop</button>
    <button onclick="change(-20)">&lt;&lt;</button>
    <button onclick="change(-10)"> &lt;</button>
    <button onclick="change(10)">&gt;</button>
    <button onclick="change(20)">&gt;&gt;</button>
    <button onclick="toggleMute()" id="muteBtn">Mute</button>
    <label for="">Volume:
        <input type="range" min="0" max="1" step="0.05" id="volume" onchange="changeVolume(this.value)">
    </label>
    <label for="">Speed:
        <input type="range" min="0.25" max="2" step="0.25" id="speed" onchange="changeSpeed(this.value)">
    </label>
  </div>
  <script src="tst.js"></script>
</body>
</html>
